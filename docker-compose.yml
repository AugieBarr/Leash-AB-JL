# Deliberately-vulnerable target for authorized, lab-scoped testing only.
# OWASP Juice Shop — https://owasp.org/www-project-juice-shop/
services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: leash-juice-shop
    ports:
      - "3000:3000"
    restart: unless-stopped
    # Lets `docker compose up -d --wait juice-shop` block until the target actually
    # serves — closing the "demo script starts before Juice Shop is ready" race. Uses
    # node (always present, it runs the app), so the probe needs no extra tooling.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 20s
