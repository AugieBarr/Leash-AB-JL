[project]
name = "leash"
version = "0.1.0"
description = "A governed offensive agent swarm on Band — autonomous web-app pentest with a scope leash, tamper-evident audit, and a human kill-switch."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Josh Langsam" },
    { name = "Augie Barreirinhas" },
]
dependencies = [
    "band-sdk[anthropic,claude_sdk]>=1.0.0",
    "cryptography>=43.0.0",
    "pydantic>=2.7.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
]
viewer = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

# Exact versions are pinned in uv.lock (generated by `uv sync`).
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["governance", "agents", "tools", "swarm", "scale_test"]
